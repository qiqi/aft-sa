# Newton version of tiny_test for fast implicit convergence
# CFL ramps exponentially: 1 → 10 → 100 → 1000 → 10000 → infinity
# Each decade takes 200 iterations, 5 decades = 1000 iterations total
#
# Usage: python scripts/solver/run_airfoil.py config/examples/tiny_test_newton.yaml

grid:
  airfoil: data/naca0012.dat
  n_surface: 41          # ~40 cells around airfoil (~20 per side)
  n_wake: 6              # ~6 wake cells
  y_plus: 10.0           # Relaxed wall resolution (coarse)
  gradation: 1.3         # Aggressive stretching → ~10 J cells
  farfield_radius: 3.0   # Smaller domain for fewer cells
  te_spacing: 0.05
  le_spacing: 0.05       # Match te_spacing for balanced distribution

flow:
  reynolds: 1.0e+6
  alpha: 4.0
  chi_inf: 10            # AFT transition model

solver:
  max_iter: 1000
  tol: 1.0e-8
  print_freq: 50
  diagnostic_freq: 200
  mode: newton           # Newton-GMRES implicit solver
  
  cfl:
    initial: 1.0         # Start at CFL=1
    final: 1.0e10        # Effectively infinity
    ramp_iter: 200       # 200 iterations per decade (1→10→100→...)
  
  # GMRES settings
  gmres_restart: 20
  gmres_maxiter: 100
  gmres_tol: 1.0e-3
  newton_relaxation: 1.0

numerics:
  jst_k4: 0.04           # 4th-order dissipation
  beta: 10.0             # Artificial compressibility

output:
  directory: output/tiny_test_newton
  case_name: tiny_newton
  html_animation: true
  divergence_history: 1
